name: Post Pull Request Comment
description: |
  Creates or updates a marker-tagged comment on the current pull request
  from a markdown file composed by the caller.

inputs:
  marker:
    description: Unique marker slug identifying this comment for upserts
    required: true

  body-file:
    description: Path to a markdown file used as the comment body (e.g. COMMENT.md)
    required: true

runs:
  using: composite
  steps:
    - name: Upsert PR comment
      uses: actions/github-script@v8
      env:
        INPUT_MARKER: ${{ inputs.marker }}
        INPUT_BODY_FILE: ${{ inputs.body-file }}
      with:
        script: |
          const fs = require('fs');
          const marker = `<!-- ${process.env.INPUT_MARKER} -->`;
          const content = fs.readFileSync(process.env.INPUT_BODY_FILE, 'utf8');
          const body = `${marker}\n${content}`;

          const { data: comments } = await github.rest.issues.listComments({
            ...context.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              ...context.repo, comment_id: existing.id, body,
            });
          } else {
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number, body,
            });
          }
