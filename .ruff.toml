line-length = 90

fix = true

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
    "FAST",
    "S",
    "ERA",
    "G",
    "ASYNC",
    "PERF",
    "B",
    "TID",
    "SIM",
    "C4",
    "DTZ",
    "PTH",
    "PT",
    "A",
    "LOG",
    "TC",
    "PGH",
    "FURB",
    "RUF",
    "TRY",
    "N",
    "FLY",
    "COM",
    "EXE",
    "PIE",
    "C901",
    "D404",
    "D417",
    "D419",
    "RET",
    "SLF",
    "RSE",
    "PYI",
    "ANN001",
    "ANN201",
    "ANN202",
    "ANN204",
    "ANN205",
    "ANN206",
    "FBT001",
    "FBT002",
]

ignore = [
    "COM812",
    "PGH003",
    "RUF001",
    "RUF002",
    "RUF003",
    "RUF006",
    "RUF012",
    "RUF029",
    "TRY400",
    "TRY003",
    "TRY301",
    "S101",
    "S106",
    "S104",
    "S105",
]

[lint.per-file-ignores]
# there is alot of lore for why this rule is here see: https://github.com/fastapi/fastapi/issues/13056
"app/**/model.py" = ["TC001", "TC002", "TC003"]
"app/**/models/**" = ["TC001", "TC002", "TC003"]
"app/**/deps.py" = ["TC001", "TC002", "TC003"]
"app/api/routes/**" = ["TC001", "TC002", "TC003"]
"app/**/schemas.py" = ["TC001", "TC002", "TC003"]
"app/**/schemas/**" = ["TC001", "TC002", "TC003"]
"app/infra/db/mixins.py" = ["TC001", "TC002", "TC003"]
# SLF001 relaxed: tests may poke private members to pin internal behavior
"test/**" = ["TC001", "TC002", "TC003", "SLF001"]
"app/infra/db/models.py" = ["F401"]
# autogenerated by alembic; never hand-edited, so line length is not enforced
"alembic/versions/**" = ["E501"]


[lint.flake8-quotes]
docstring-quotes = "single"

[lint.flake8-type-checking]
exempt-modules = ["typing", "typing_extensions"]
quote-annotations = false
strict = false

runtime-evaluated-base-classes = [
    "pydantic.BaseModel",
    "sqlalchemy.orm.DeclarativeBase",
    "msgspec.Struct",
]

runtime-evaluated-decorators = [
    "pydantic.validate_call",
    "pydantic.dataclasses.dataclass",
    "fastapi.FastAPI.get",
    "fastapi.FastAPI.post",
    "fastapi.FastAPI.put",
    "fastapi.FastAPI.patch",
    "fastapi.FastAPI.delete",
    "fastapi.FastAPI.options",
    "fastapi.FastAPI.head",
]

[lint.pylint]
allow-dunder-method-names = ["__tablename__", "__table_args__"]

[format]
docstring-code-format = true
preview = true
quote-style = "single"
